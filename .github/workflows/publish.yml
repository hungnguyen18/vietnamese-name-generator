name: Publish to npm

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      skip_authorization:
        required: false
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  authorization-check:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_authorization }}
    steps:
      - name: Check authorized user
        env:
          CURRENT_USER: ${{ github.actor }}
        run: |
          AUTHORIZED_USERS=('hungnguyen18')
          if [[ " ${AUTHORIZED_USERS[*]} " =~ " ${CURRENT_USER} " ]]; then
            echo "User ${CURRENT_USER} is authorized"
          else
            echo "User ${CURRENT_USER} is NOT authorized"
            exit 1
          fi

  publish:
    runs-on: ubuntu-latest
    needs: authorization-check
    if: always() && (needs.authorization-check.result == 'success' || inputs.skip_authorization)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check if version exists on npm
        id: check-version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PACKAGE_NAME=$(jq -r '.name' package.json)
          if npm view "${PACKAGE_NAME}@${VERSION}" version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.check-version.outputs.exists == 'false'
        run: npm run build

      - name: Publish
        if: steps.check-version.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
          EXISTS: ${{ steps.check-version.outputs.exists }}
        run: |
          PACKAGE_NAME=$(jq -r '.name' package.json)
          if [ "${EXISTS}" = 'true' ]; then
            echo "Skipped — ${PACKAGE_NAME}@${VERSION} already on npm" >> $GITHUB_STEP_SUMMARY
          else
            echo "Published ${PACKAGE_NAME}@${VERSION} to https://www.npmjs.com/package/${PACKAGE_NAME}" >> $GITHUB_STEP_SUMMARY
          fi

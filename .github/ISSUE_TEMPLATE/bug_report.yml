name: Bug Report
description: Report a bug in vietnamese-name-generator
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code to reproduce the issue.
      placeholder: |
        ```typescript
        import { generate } from 'vietnamese-name-generator';
        const result = generate({ seed: 42 });
        // Expected: ...
        // Actual: ...
        ```
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "0.12.0"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Node.js
        - Browser (ESM)
        - Bun
        - Deno
        - CLI
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or error messages.
